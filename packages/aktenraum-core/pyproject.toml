[project]
name = "aktenraum-core"
version = "0.1.0"
description = "Shared library for aktenraum services: LLM backends, Paperless API client, and extraction models."
requires-python = ">=3.13"
dependencies = [
    "anthropic>=0.40.0",
    "ollama>=0.4.0",
    "pydantic>=2.10.0",
    "httpx>=0.28.0",
    "structlog>=24.4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aktenraum_core"]
