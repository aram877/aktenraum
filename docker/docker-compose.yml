services:

  paperless:
    # Pinned to the version actually deployed (verified via
    # paperless.version.__version__ at change time). Bump deliberately,
    # never by accident: floating :latest hid this behaviour for months.
    image: ghcr.io/paperless-ngx/paperless-ngx:2.20.15@sha256:6c86cad803970ea782683a8e80e7403444c5bf3cf70de63b4d3c8e87500db92f
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      gotenberg:
        condition: service_started
      tika:
        condition: service_started
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ${AKTENRAUM_DATA_DIR:-${HOME}/aktenraum}/data:/usr/src/paperless/data
      - ${AKTENRAUM_DATA_DIR:-${HOME}/aktenraum}/media:/usr/src/paperless/media
      - ${AKTENRAUM_DATA_DIR:-${HOME}/aktenraum}/export:/usr/src/paperless/export
      - ${AKTENRAUM_DATA_DIR:-${HOME}/aktenraum}/consume:/usr/src/paperless/consume
      - ./paperless-scripts:/usr/src/paperless/scripts:ro
    env_file:
      - path: .env
        required: false
    environment:
      PAPERLESS_REDIS: redis://redis:6379
      PAPERLESS_DBHOST: postgres
      PAPERLESS_TIKA_ENABLED: "1"
      PAPERLESS_TIKA_ENDPOINT: http://tika:9998
      PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://gotenberg:3000
      PAPERLESS_POST_CONSUME_SCRIPT: /usr/src/paperless/scripts/post_consume.sh
      AKTENRAUM_WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
    networks:
      - internal

  postgres:
    image: postgres:15
    restart: unless-stopped
    volumes:
      - ${AKTENRAUM_DATA_DIR:-${HOME}/aktenraum}/pgdata:/var/lib/postgresql/data
      # Init scripts run only on a fresh data dir; existing installs need to
      # `CREATE DATABASE aktenraum` once by hand (see docs/runbooks/operations.md).
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    environment:
      POSTGRES_DB: ${PAPERLESS_DBNAME:-paperless}
      POSTGRES_USER: ${PAPERLESS_DBUSER:-paperless}
      POSTGRES_PASSWORD: ${PAPERLESS_DBPASS:?PAPERLESS_DBPASS is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PAPERLESS_DBUSER:-paperless}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7
    restart: unless-stopped
    networks:
      - internal

  gotenberg:
    # Pinned to the patch version currently running (verified via the
    # org.opencontainers.image.version label). Floating :8 silently
    # tracks any 8.x release; this freezes it.
    image: gotenberg/gotenberg:8.31.0@sha256:f0d86e8a1dbc7b33a5a65cb251d02bb271a48ffa989da3feb5ed7d954fe4d4b3
    restart: unless-stopped
    command:
      - gotenberg
      - --chromium-disable-javascript=true
      - --chromium-allow-list=file:///tmp/.*
    networks:
      - internal

  tika:
    # Pinned to the digest currently running. apache/tika's tag scheme
    # (3.x.y vs YY.MM labels) is ambiguous enough that digest is the
    # only reproducible pin; the tag prefix is documentation, not
    # authoritative. NOTE: stay on apache/tika (not
    # ghcr.io/paperless-ngx/tika — that one requires auth and 403s).
    image: apache/tika:latest@sha256:2a565f1ea1290bdcb74a7d35957d16a989ed44ef98790dcdcc28121d728fa583
    restart: unless-stopped
    networks:
      - internal

  qdrant:
    # Vector store for the RAG indexing + retrieval pipeline (RAG Phase 1).
    # REST API on 6333 (used by the Python client we wired in 1.3); gRPC on
    # 6334 stays internal in case a future feature wants the streaming API.
    # 6333 is bound to 127.0.0.1 ONLY so the built-in dashboard at
    # /dashboard is reachable from the dev machine without exposing the
    # vector store to the LAN. Override AKTENRAUM_QDRANT_PORT in docker/.env
    # if 6333 is already in use locally.
    image: qdrant/qdrant:v1.17.1
    restart: unless-stopped
    volumes:
      - ${AKTENRAUM_DATA_DIR:-${HOME}/aktenraum}/qdrant:/qdrant/storage
    ports:
      - "127.0.0.1:${AKTENRAUM_QDRANT_PORT:-6333}:6333"
    expose:
      - "6334"
    healthcheck:
      # The qdrant image is debian-slim with bash but no wget/curl. We invoke
      # bash explicitly (CMD form, not CMD-SHELL) because /dev/tcp is a bash
      # built-in and CMD-SHELL would route through dash, which doesn't
      # understand it. Coarser than hitting /readyz over HTTP (a serving-
      # but-misconfigured qdrant looks healthy here) but reliable across
      # image variants without needing to apt-install curl.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/6333"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - internal

  auto-tagger:
    build:
      context: ..
      dockerfile: services/auto-tagger/Dockerfile
    restart: unless-stopped
    depends_on:
      paperless:
        condition: service_started
      qdrant:
        condition: service_healthy
      # Soft dependency: the auto-tagger boots even if aktenraum-api is
      # still warming up. When unreachable the rule-fetch fails closed
      # (everything routes to ai-pending) until the cache populates.
      aktenraum-api:
        condition: service_started
    env_file:
      - path: auto-tagger.env
        required: false
    environment:
      # Default the Qdrant URL to the in-network address so a fresh install
      # works without env editing (per ADR-002). Override in auto-tagger.env
      # for development against a local qdrant on the host.
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
    expose:
      # HTTP listener for paperless's post_consume hook. Internal-network only;
      # never published to the host.
      - "8001"
    networks:
      - internal

  aktenraum-api:
    build:
      context: ..
      dockerfile: services/aktenraum-api/Dockerfile
    restart: unless-stopped
    volumes:
      # RAG eval cases (Phase 1.10). Bind-mounted instead of baked into
      # the image so editing golden-questions.yaml doesn't require a
      # rebuild — the runner re-reads the file on every invocation.
      # Read-only so a buggy runner can never trash the cases.
      - ../evals:/app/evals:ro
      # HuggingFace cache for the bge-reranker-v2-m3 model (~600 MB).
      # Without this volume every `docker compose up -d --build
      # aktenraum-api` re-pays the download. The Dockerfile runs as
      # appuser whose $HOME is /home/appuser; HF_HOME below pins the
      # location regardless of any future USER change.
      - aktenraum-hf-cache:/home/appuser/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
      - path: aktenraum-api.env
        required: false
    environment:
      # Built from PAPERLESS_DB* in .env so DB credentials live in one place.
      DATABASE_URL: postgresql+asyncpg://${PAPERLESS_DBUSER:-paperless}:${PAPERLESS_DBPASS}@postgres:5432/aktenraum
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      # Pin sentence-transformers / huggingface_hub cache into the volume
      # above so reranker downloads survive image rebuilds.
      HF_HOME: /home/appuser/.cache/huggingface
      HUGGINGFACE_HUB_CACHE: /home/appuser/.cache/huggingface/hub
    expose:
      - "8002"
    networks:
      - internal

  nginx:
    build:
      context: ..
      dockerfile: docker/nginx/Dockerfile
    restart: unless-stopped
    depends_on:
      - aktenraum-api
    ports:
      # Host 8080 → container 80. Port 80 is often taken on dev machines (eg.
      # by another project's traefik); 8080 is the conventional alternate.
      # Override via AKTENRAUM_WEB_PORT in docker/.env.
      - "127.0.0.1:${AKTENRAUM_WEB_PORT:-8080}:80"
    networks:
      - internal

  backup:
    build:
      context: ./backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: backup.env
        required: false
    volumes:
      - ${AKTENRAUM_DATA_DIR:-${HOME}/aktenraum}/data:/backup/data:ro
      - ${AKTENRAUM_DATA_DIR:-${HOME}/aktenraum}/media:/backup/media:ro
      - ${AKTENRAUM_DATA_DIR:-${HOME}/aktenraum}/export:/backup/export:ro
      - ${AKTENRAUM_DATA_DIR:-${HOME}/aktenraum}/backup/restic-repo:/repo
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  # Survives `docker compose up -d --build aktenraum-api` so the
  # bge-reranker-v2-m3 (~600 MB) is downloaded once, not on every
  # rebuild. Lifespan warm-up in aktenraum_api.main pre-loads the
  # model into RAM at startup; this volume keeps the bytes on disk.
  aktenraum-hf-cache:
