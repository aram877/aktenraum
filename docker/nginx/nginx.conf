server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Total upload size cap. /api/documents/upload allows up to
    # upload_max_files_per_request (20) × upload_max_file_bytes (25 MB) =
    # 500 MB; nginx caps the multipart envelope at the same ceiling.
    # Without this, nginx defaults to 1 MB and silently 413s real uploads.
    client_max_body_size 500m;

    # Don't advertise the nginx version in error pages / Server header.
    server_tokens off;

    # Defensive security headers applied to every response. The strict CSP
    # only fires on HTML responses so the API's JSON endpoints aren't
    # affected. `frame-ancestors 'none'` prevents the SPA being framed onto
    # a phish site that overlays a CSRF form.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Docker's embedded DNS lives at 127.0.0.11. Without an explicit resolver
    # nginx caches the api container's IP at startup, so every rebuild of
    # aktenraum-api (which gives the container a fresh IP) breaks login until
    # nginx is also restarted. Re-resolving every 10s costs nothing here and
    # eliminates the footgun. `ipv6=off` avoids "no resolver defined to
    # resolve aktenraum-api" warnings against the AAAA query path.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Reverse-proxy for the API. Trailing slash matching is important: /api/foo
    # becomes aktenraum-api:8002/api/foo (the SPA already prefixes /api).
    # The hostname goes through a variable so nginx defers DNS resolution to
    # request time (and uses the `resolver` above) instead of caching it once
    # at startup. Note: with a variable in proxy_pass, nginx does NOT
    # automatically forward the request URI, so we append `$request_uri`
    # explicitly to keep `/api/...` intact end-to-end.
    location /api/ {
        set $aktenraum_api http://aktenraum-api:8002;
        proxy_pass $aktenraum_api$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # AI endpoints invoke local LLMs that can take a while on bigger models;
        # 60s is too tight for two-call Q&A pipelines.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # SSE / streaming endpoint: nginx must not buffer the response body or
    # the browser receives the entire stream as one payload at the end,
    # defeating the point. Match the streaming-only path explicitly so
    # other JSON endpoints keep their default buffering behaviour. The
    # `X-Accel-Buffering: no` header from the application is honoured by
    # nginx (since 1.5.6) but only when buffering is at least enabled to
    # be turned off — adding the explicit directive is the belt; the
    # header is the braces.
    location = /api/ai/answer/stream {
        set $aktenraum_api http://aktenraum-api:8002;
        proxy_pass $aktenraum_api$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    # SPA fallback: serve assets verbatim, fall back to index.html so client-side
    # routes (/login, /, etc.) load the SPA instead of 404ing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't long-cache index.html — the SPA's hashed assets carry the cacheable
    # bits and index.html is the entry that points to the latest hashes.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
