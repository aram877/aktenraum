# aktenraum task runner — https://taskfile.dev
#
# Install:
#   macOS    : brew install go-task
#   Linux    : sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b ~/.local/bin
#   Windows  : winget install Task.Task
#
# List tasks:
#   task --list
#
# Pass vars on the CLI:
#   task logs SVC=auto-tagger
#   task reprocess ID=27

version: "3"

silent: true

vars:
  DOCKER_DIR: docker
  COMPOSE: docker compose --project-directory docker

tasks:
  default:
    desc: "List available tasks"
    cmds:
      - task --list

  # ----- Stack lifecycle -----

  up:
    desc: "Start the full Docker stack in the background"
    cmds:
      - "{{.COMPOSE}} up -d"

  down:
    desc: "Stop the full stack (data preserved)"
    cmds:
      - "{{.COMPOSE}} down"

  restart:
    desc: "Restart every service (does NOT re-read env files; use up/recreate for that)"
    cmds:
      - "{{.COMPOSE}} restart"

  ps:
    desc: "Show container status"
    cmds:
      - "{{.COMPOSE}} ps"

  logs:
    desc: "Tail logs. SVC=<service> for a single service; omit for all."
    cmds:
      - |
        if [ -n "{{.SVC}}" ]; then
          {{.COMPOSE}} logs -f --tail=200 {{.SVC}}
        else
          {{.COMPOSE}} logs -f --tail=100
        fi

  recreate:
    desc: "Recreate a service so it picks up env-file changes. SVC=<service> required."
    cmds:
      - |
        if [ -z "{{.SVC}}" ]; then
          echo 'Usage: task recreate SVC=<service>' >&2; exit 1
        fi
        {{.COMPOSE}} up -d {{.SVC}}

  # ----- First-time setup -----

  bootstrap:
    desc: "First-time setup: create host dirs, generate secrets, start stack"
    cmds:
      - bash scripts/setup.sh
      - bash scripts/bootstrap-secrets.sh
      - "{{.COMPOSE}} up -d"
      - |
        cat <<'EOF'

        Stack is up. Two manual steps remain:

          1. Mint a Paperless API token (admin password printed by bootstrap-secrets):
               TOKEN=$(curl -s -X POST http://localhost:8000/api/token/ \
                 -H 'Content-Type: application/json' \
                 -d '{"username":"admin","password":"<from-bootstrap>"}' \
                 | python3 -c "import sys,json;print(json.load(sys.stdin)['token'])")
             then put it into BOTH docker/auto-tagger.env and docker/aktenraum-api.env
             as PAPERLESS_API_TOKEN, and run:
               task recreate SVC=auto-tagger
               task recreate SVC=aktenraum-api

          2. Bootstrap Paperless custom fields + lifecycle tags:
               PAPERLESS_BASE_URL=http://localhost:8000 \
               PAPERLESS_API_TOKEN=$TOKEN \
               task paperless:bootstrap

        SPA: http://localhost:8080 (or AKTENRAUM_WEB_PORT)
        EOF

  paperless:bootstrap:
    desc: "Create Paperless custom fields + lifecycle tags via REST API"
    cmds:
      # Runs the bootstrap inside the auto-tagger container so we don't
      # depend on the host having bash. Works identically on macOS / Linux
      # PowerShell / Git Bash. Requires the stack to be up so paperless
      # is reachable from within the network.
      - "{{.COMPOSE}} exec -T auto-tagger /app/.venv/bin/python -m auto_tagger.bootstrap_paperless"

  # ----- Frontend (SPA) -----

  web:install:
    desc: "Install JS deps (pnpm)"
    cmds:
      - pnpm install

  web:dev:
    desc: "Vite dev server (hot reload, binds 0.0.0.0 → reachable from LAN at :5173)"
    deps: [web:install]
    cmds:
      - pnpm --filter @aktenraum/web dev

  web:build:
    desc: "Production build of the SPA (tsc + vite build)"
    deps: [web:install]
    cmds:
      - pnpm --filter @aktenraum/web build

  web:lint:
    desc: "ESLint on the SPA"
    deps: [web:install]
    cmds:
      - pnpm --filter @aktenraum/web lint

  web:types:
    desc: "Regenerate TypeScript types from /api/openapi.json (stack must be up)"
    deps: [web:install]
    cmds:
      - pnpm --filter @aktenraum/web generate:api-types

  web:deploy:
    desc: "Build the SPA into the nginx image (use after SPA changes when not running web:dev)"
    cmds:
      - "{{.COMPOSE}} up -d --build nginx"

  # ----- Backend services -----

  api:rebuild:
    desc: "Rebuild + recreate aktenraum-api after Python/code changes"
    cmds:
      - "{{.COMPOSE}} up -d --build aktenraum-api"

  api:logs:
    desc: "Tail aktenraum-api logs"
    cmds:
      - "{{.COMPOSE}} logs -f --tail=200 aktenraum-api"

  tagger:rebuild:
    desc: "Rebuild + recreate auto-tagger after Python/code changes"
    cmds:
      - "{{.COMPOSE}} up -d --build auto-tagger"

  tagger:logs:
    desc: "Tail auto-tagger logs"
    cmds:
      - "{{.COMPOSE}} logs -f --tail=200 auto-tagger"

  nginx:rebuild:
    desc: "Rebuild + recreate nginx (picks up SPA changes; same as web:deploy)"
    cmds:
      - "{{.COMPOSE}} up -d --build nginx"

  rebuild:all:
    desc: "Rebuild every locally-built service (auto-tagger, aktenraum-api, nginx, backup)"
    cmds:
      - "{{.COMPOSE}} up -d --build auto-tagger aktenraum-api nginx backup"

  # ----- Tests + lint -----

  test:
    desc: "Run the full test suite (pytest + SPA typecheck/build)"
    deps: [test:py, test:web]

  test:py:
    desc: "Python tests (pytest at the workspace root)"
    cmds:
      - uv run pytest

  test:web:
    desc: "SPA typecheck + production build (there's no Vitest suite yet)"
    deps: [web:install]
    cmds:
      - pnpm --filter @aktenraum/web build

  lint:
    desc: "Lint both Python and SPA"
    deps: [lint:py, lint:web]

  lint:py:
    desc: "ruff check"
    cmds:
      - uv run ruff check

  lint:web:
    desc: "ESLint"
    deps: [web:install]
    cmds:
      - pnpm --filter @aktenraum/web lint

  format:
    desc: "ruff format (Python)"
    cmds:
      - uv run ruff format

  # ----- One-shot ops -----

  reprocess:
    desc: "Clear lifecycle tags on a single doc so the auto-tagger re-extracts it. ID=<doc-id> required."
    cmds:
      - |
        if [ -z "{{.ID}}" ]; then
          echo 'Usage: task reprocess ID=<doc-id>' >&2; exit 1
        fi
        TOKEN=$(grep '^PAPERLESS_API_TOKEN=' docker/auto-tagger.env | cut -d= -f2-)
        if [ -z "$TOKEN" ]; then
          echo 'PAPERLESS_API_TOKEN missing from docker/auto-tagger.env' >&2; exit 1
        fi
        curl -sS -X PATCH "http://localhost:8000/api/documents/{{.ID}}/" \
          -H "Authorization: Token $TOKEN" \
          -H "Content-Type: application/json" \
          -d '{"tags": []}' -o /dev/null -w "PATCH status: %{http_code}\n"
        echo "Cleared lifecycle tags on doc {{.ID}}. Poller picks up within 30s — task tagger:logs to watch."

  rag:backfill:
    desc: "Index every existing document into Qdrant for RAG (idempotent)"
    cmds:
      - bash scripts/backfill-rag-index.sh

  rag:eval:
    desc: "Run the RAG eval harness against evals/golden-questions.yaml"
    cmds:
      - bash scripts/run-rag-eval.sh

  backup:run:
    desc: "Trigger a manual backup snapshot"
    cmds:
      - MSYS_NO_PATHCONV=1 {{.COMPOSE}} exec backup //usr/local/bin/entrypoint.sh

  backup:snapshots:
    desc: "List restic snapshots"
    cmds:
      - MSYS_NO_PATHCONV=1 {{.COMPOSE}} exec backup restic snapshots --tag aktenraum

  # ----- Tailscale remote access (see docs/runbooks/tailscale-remote-access.md) -----

  tailscale:serve:
    desc: "Expose aktenraum on the tailnet over HTTPS (proxies https://<host>.<tailnet>.ts.net → local SPA port). Persists across reboots via --bg. Requires Tailscale installed + tailscale up."
    cmds:
      - tailscale serve --bg --https=443 http://localhost:${AKTENRAUM_WEB_PORT:-8080}

  tailscale:status:
    desc: "Show the current tailscale serve mappings (sanity check after tailscale:serve)."
    cmds:
      - tailscale serve status

  # ----- DB / Qdrant inspection -----

  db:paperless:
    desc: "Open a psql shell on the Paperless database"
    cmds:
      - "{{.COMPOSE}} exec postgres psql -U paperless -d paperless"

  db:aktenraum:
    desc: "Open a psql shell on the aktenraum database (users, type_fields)"
    cmds:
      - "{{.COMPOSE}} exec postgres psql -U paperless -d aktenraum"

  db:query:
    desc: 'Run a one-shot query against a DB. DB=aktenraum|paperless SQL="..."'
    cmds:
      - |
        if [ -z "{{.SQL}}" ]; then
          echo 'Usage: task db:query DB=aktenraum SQL="SELECT 1"' >&2; exit 1
        fi
        DB="{{.DB}}"
        if [ -z "$DB" ]; then DB=aktenraum; fi
        {{.COMPOSE}} exec postgres psql -U paperless -d "$DB" -c "{{.SQL}}"

  qdrant:dashboard:
    desc: "Open the Qdrant web UI. Stack must be up; 127.0.0.1:6333:6333 mapping enabled."
    cmds:
      - |
        URL="http://localhost:${AKTENRAUM_QDRANT_PORT:-6333}/dashboard"
        echo "Opening $URL"
        if command -v open >/dev/null 2>&1; then open "$URL"
        elif command -v xdg-open >/dev/null 2>&1; then xdg-open "$URL"
        else echo "Open it manually in a browser."
        fi

  qdrant:info:
    desc: "Print the aktenraum_chunks collection info (point count, vector dims)"
    cmds:
      - |
        URL="http://localhost:${AKTENRAUM_QDRANT_PORT:-6333}"
        curl -sS "$URL/collections/aktenraum_chunks" | python3 -m json.tool

  qdrant:count:
    desc: "Total point count in aktenraum_chunks"
    cmds:
      - |
        URL="http://localhost:${AKTENRAUM_QDRANT_PORT:-6333}"
        curl -sS -X POST "$URL/collections/aktenraum_chunks/points/count" \
          -H "Content-Type: application/json" -d '{}' \
          | python3 -m json.tool

  qdrant:chunks:
    desc: "Show the indexed chunks for one document. ID=<doc-id> required."
    cmds:
      - |
        if [ -z "{{.ID}}" ]; then
          echo 'Usage: task qdrant:chunks ID=<doc-id>' >&2; exit 1
        fi
        URL="http://localhost:${AKTENRAUM_QDRANT_PORT:-6333}"
        curl -sS -X POST "$URL/collections/aktenraum_chunks/points/scroll" \
          -H "Content-Type: application/json" \
          -d '{"filter":{"must":[{"key":"doc_id","match":{"value":{{.ID}}}}]},"limit":20,"with_payload":true}' \
          | python3 -c "import sys,json; r=json.load(sys.stdin); [print(p['payload']['chunk_index'],'·',(p['payload']['text'] or '')[:200].replace(chr(10),' ')) for p in r['result']['points']]"
